# =============================================================================
# DDoS Prevention — POST Request Rate Limiting v3.0
# =============================================================================
# Include inside location blocks that handle POST-heavy endpoints:
#   location /api { include snippets/ddos-post.conf; ... }
# =============================================================================

limit_req zone=ddos_post_limit burst=20 nodelay;
limit_req_status 429;

# POST bodies shouldn't be infinite — cap at 5MB unless your app needs more.
client_max_body_size 5m;
client_body_timeout 10s;
