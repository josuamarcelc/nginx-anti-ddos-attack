# =============================================================================
# DDoS Prevention — Kernel Sysctl Hardening v3.0
# =============================================================================
# Copy to /etc/sysctl.d/99-ddos-hardening.conf then run: sysctl --system
# These settings protect against SYN floods, ICMP floods, IP spoofing,
# connection table exhaustion, and other network-layer attacks.
# =============================================================================

# --- SYN FLOOD PROTECTION ---
# Enable SYN cookies — the single most important kernel DDoS defense.
# When the SYN backlog fills, the kernel uses cryptographic cookies instead
# of allocating memory. Without this, SYN floods exhaust your connection table.
net.ipv4.tcp_syncookies = 1

# Maximum SYN backlog queue. Default is 128 — pathetically low.
net.ipv4.tcp_max_syn_backlog = 65536

# Number of SYN retries before giving up (lower = faster timeout for garbage).
net.ipv4.tcp_syn_retries = 2
net.ipv4.tcp_synack_retries = 2

# --- CONNECTION TABLE ---
# Maximum tracked connections. Default ~65k will be exhausted in seconds
# under a real DDoS. Set based on your RAM: 1M entries ≈ 256MB.
net.netfilter.nf_conntrack_max = 1000000

# Faster cleanup of dead connections.
net.netfilter.nf_conntrack_tcp_timeout_established = 600
net.netfilter.nf_conntrack_tcp_timeout_time_wait = 30
net.netfilter.nf_conntrack_tcp_timeout_close_wait = 30
net.netfilter.nf_conntrack_tcp_timeout_fin_wait = 30

# --- TCP HARDENING ---
# Reuse TIME_WAIT sockets for new connections (prevents port exhaustion).
net.ipv4.tcp_tw_reuse = 1

# Faster orphan socket cleanup.
net.ipv4.tcp_max_orphans = 65536
net.ipv4.tcp_orphan_retries = 2

# Reduce FIN-WAIT timeout (default 60s is too generous).
net.ipv4.tcp_fin_timeout = 15

# Keepalive — detect dead connections faster.
net.ipv4.tcp_keepalive_time = 600
net.ipv4.tcp_keepalive_intvl = 15
net.ipv4.tcp_keepalive_probes = 5

# TCP window scaling (better throughput for legitimate users).
net.ipv4.tcp_window_scaling = 1

# Increase socket backlog for high-traffic servers.
net.core.somaxconn = 65536
net.core.netdev_max_backlog = 65536

# --- ICMP FLOOD PROTECTION ---
# Rate-limit ICMP responses to prevent ping floods.
net.ipv4.icmp_ratelimit = 100
net.ipv4.icmp_ratemask = 88089

# Ignore ICMP broadcast (Smurf attack prevention).
net.ipv4.icmp_echo_ignore_broadcasts = 1

# Ignore bogus ICMP error responses.
net.ipv4.icmp_ignore_bogus_error_responses = 1

# --- IP SPOOFING PROTECTION ---
# Reverse path filtering — drop packets with spoofed source IPs.
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# Don't accept source routing (prevents IP source route attacks).
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0

# Don't accept ICMP redirects (MITM prevention).
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv4.conf.all.secure_redirects = 0
net.ipv4.conf.default.secure_redirects = 0
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# IPv6 equivalents
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0
net.ipv6.conf.all.accept_source_route = 0
net.ipv6.conf.default.accept_source_route = 0

# --- MEMORY BUFFERS ---
# Increase TCP memory for high connection counts.
net.ipv4.tcp_mem = 786432 1048576 1572864
net.ipv4.tcp_rmem = 4096 87380 6291456
net.ipv4.tcp_wmem = 4096 65536 6291456

# --- LOG MARTIANS (for debugging spoofed packets) ---
net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1

# --- DISABLE IPv4 FORWARDING (unless this is a router/gateway) ---
# net.ipv4.ip_forward = 0

# --- PAGE CACHE OPTIMIZATION (for static site serving from RAM) ---
# Bias the kernel toward keeping file data in page cache.
# Lower swappiness = prefer keeping file pages over anonymous pages.
# For a static file server, file pages ARE your workload.
vm.swappiness = 10

# Flush dirty pages sooner (don't accumulate large write backlogs).
vm.dirty_ratio = 10
vm.dirty_background_ratio = 5

# Increase the max number of memory map areas (for many open files).
vm.max_map_count = 262144

# --- EPHEMERAL PORT POOL ---
# When the box makes lots of OUTGOING connections (proxy_pass, fpm-to-DB,
# CDN origin pulls), the kernel runs out of source ports and new connections
# stall with EADDRNOTAVAIL. Default 32768-60999 = ~28k ports; widen to ~64k
# so the box doesn't trip on it during a thundering-herd.
net.ipv4.ip_local_port_range = 1024 65000
