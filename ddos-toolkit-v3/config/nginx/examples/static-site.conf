# =============================================================================
# Example: Static Site vhost with full DDoS + Cache hardening
# =============================================================================
# Copy this to /etc/nginx/sites-available/example.com
# Symlink: ln -s /etc/nginx/sites-available/example.com /etc/nginx/sites-enabled/
# =============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name example.com www.example.com;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name example.com www.example.com;

    root /var/www/example.com;
    index index.html;

    # --- SSL (adjust paths to your certs) ---
    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # =========================================
    # LAYER 1: DDoS Protection (include first)
    # =========================================
    include snippets/ddos-global.conf;

    # =========================================
    # LAYER 2: Static Cache Hardening
    # =========================================
    include snippets/cache-static.conf;

    # =========================================
    # Optional: Auth endpoint hardening
    # =========================================
    # location /login {
    #     include snippets/ddos-auth.conf;
    #     try_files $uri =404;
    # }

    # =========================================
    # Optional: Download endpoint hardening
    # =========================================
    # location /downloads {
    #     include snippets/ddos-download.conf;
    #     alias /var/www/example.com/files;
    # }

    # --- Error pages ---
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}

