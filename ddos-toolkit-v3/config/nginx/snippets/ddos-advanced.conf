# =============================================================================
# Advanced behavioral DDoS filters — drop in via include
# =============================================================================
# Pair with conf.d/ddos-global.conf (rate limits) for full coverage. This file
# focuses on REQUEST-SHAPE patterns: empty UAs, scanner UAs, SQLi-flavored
# query strings, oversize uploads, slowloris timing.
#
# Usage in a server { } or location { }:
#     include snippets/ddos-advanced.conf;
#
# 444 vs 403:
#   444 = nginx-internal "no response" (drops connection without sending bytes)
#         Best for bots — they get no useful signal; gives you cheap mitigation.
#   403 = explicit forbidden — better when you want browsers to see the rejection
# =============================================================================

# --- Drop empty User-Agent (almost always a bot/scanner) ---------------------
# Real browsers and crawlers always send a UA. Empty UA → bin.
if ($http_user_agent = "") {
    return 444;
}

# --- Block well-known scanner / mass-recon tools -----------------------------
# Whitelisted exception path: if you legitimately need curl/wget access (CI,
# uptime-checks), allow it via a sub-location with `set $bypass_ua 1; ...`.
if ($http_user_agent ~* "(nikto|sqlmap|fimap|masscan|nmap|wpscan|dirbuster|gobuster|whatweb|acunetix|nessus|openvas|metasploit|burp(suite)?|zaproxy|nuclei|httpx|katana|skipfish|arachni)") {
    return 444;
}

# --- Optional: block curl/wget/python-requests on production sites -----------
# Uncomment if your site has zero legitimate scripted clients.
# if ($http_user_agent ~* "(^curl/|^wget/|^python-requests/|^Go-http-client/|^libwww-perl)") {
#     return 444;
# }

# --- Drop trivially malicious query-string patterns --------------------------
# Catches the dumbest 90% of automated SQLi/XSS/LFI scans. Real WAFs do this
# better, but free-tier WAFs are rare and this gives you a baseline.
if ($query_string ~* "(\bunion\b.*\bselect\b|\bselect\b.*\bfrom\b|\bdrop\b.*\btable\b|\binsert\b.*\binto\b|\bupdate\b.*\bset\b|\bdelete\b.*\bfrom\b|\bsleep\(|\bbenchmark\(|<script|onerror=|onload=|javascript:|\.\./\.\./|\.\.\\)") {
    return 403;
}

# --- Block obvious shell-injection attempts in URI ---------------------------
if ($request_uri ~* "(\.\./|/etc/passwd|/proc/self|cmd=|exec=|system\(|/wp-config\.php|\.env$|\.git/config)") {
    return 403;
}

# --- Drop suspicious referer flooding ----------------------------------------
# Some crawlers spoof a referer to game analytics. If you need to ban a known
# spam-referer wave, append patterns here.
if ($http_referer ~* "(buttons-for-website|semalt|kambasoft|savetubevideo|darodar|hulfingtonpost)") {
    return 444;
}

# --- HTTP/0.9 + HTTP/1.0 should be rare in 2026 ------------------------------
# Most real clients are HTTP/1.1 or HTTP/2. Block legacy ones unless you have
# a known need (very old IoT clients, etc.).
if ($server_protocol ~* "HTTP/0\.9|HTTP/1\.0") {
    return 444;
}

# --- Slowloris / hung-connection protection ----------------------------------
# These can also be set in the global http {} block, but redefining here lets
# you set tighter values per server { } if some sites are more exposed.
client_header_timeout    5s;
client_body_timeout      5s;
keepalive_timeout        10s 10s;
send_timeout             5s;
reset_timedout_connection on;

# --- Body / header size caps -------------------------------------------------
# 2 MB upload cap is enough for most form posts. If a vhost legitimately needs
# bigger uploads (e.g. /wp-admin/media-new.php), override this in that location:
#     location = /wp-admin/media-new.php { client_max_body_size 64m; ... }
client_max_body_size       2m;
client_body_buffer_size    16k;
client_header_buffer_size  1k;
large_client_header_buffers 2 4k;

# --- Optional: drop very long URLs (a common abuse vector) -------------------
# Most legitimate URLs are < 2 KB; anything beyond is suspicious.
# Tunable: bump if you legitimately need long tracking parameters.
# (Implemented via large_client_header_buffers above — too long → 414.)
