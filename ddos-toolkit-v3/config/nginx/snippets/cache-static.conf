# =============================================================================
# Static Site Cache Hardening — Server Block Snippet v3.0
# =============================================================================
# Include inside your static site's server { } block:
#   include snippets/cache-static.conf;
#
# Use AFTER ddos-global.conf:
#   server {
#       include snippets/ddos-global.conf;    # DDoS protection first
#       include snippets/cache-static.conf;   # Then caching
#       root /var/www/yoursite;
#       ...
#   }
#
# GOAL: Every request served from RAM. Zero disk I/O. Zero CPU.
#        A DDoS that passes the rate limiter gets a cached response
#        that costs your server almost nothing to serve.
# =============================================================================

# ---------------------------------------------------------------------------
# 1. HTML FILES — short cache, stale-while-revalidate
# ---------------------------------------------------------------------------
# HTML gets a short TTL (1 hour) so content updates propagate quickly.
# stale-while-revalidate=3600 means: if cache expired, serve stale instantly
# and refresh in background. User NEVER waits for a fresh copy.
location ~* \.html?$ {
    expires 1h;
    add_header Cache-Control "public, max-age=3600, stale-while-revalidate=3600, stale-if-error=86400" always;
    add_header X-Cache-Status "static-html" always;

    # ETag for conditional requests (304 Not Modified = tiny response).
    etag on;
    if_modified_since exact;

    # Security headers (must re-declare in location blocks).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}

# ---------------------------------------------------------------------------
# 2. HASHED STATIC ASSETS — aggressive 1-year cache
# ---------------------------------------------------------------------------
# Files with content hashes in the filename (e.g., app.a3b4c5.js, style.d6e7f8.css)
# can be cached forever because the hash changes on deploy.
# This regex matches common bundler hash patterns.
location ~* \.[a-f0-9]{6,32}\.(js|css|woff2?|ttf|eot|otf)$ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    add_header X-Cache-Status "immutable-asset" always;

    # Immutable = browser won't even send a conditional request.
    # Under DDoS, this means returning users generate ZERO requests
    # for these assets. They're served from browser cache.

    access_log off;
    etag off;
    if_modified_since off;
}

# ---------------------------------------------------------------------------
# 3. REGULAR STATIC ASSETS (JS, CSS, fonts without hash)
# ---------------------------------------------------------------------------
location ~* \.(js|css|woff2?|ttf|eot|otf)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, stale-while-revalidate=86400" always;
    add_header X-Cache-Status "static-asset" always;

    etag on;
    if_modified_since exact;
    access_log off;
}

# ---------------------------------------------------------------------------
# 4. IMAGES — long cache, most bandwidth
# ---------------------------------------------------------------------------
location ~* \.(jpg|jpeg|png|gif|webp|avif|ico|svg|bmp|tiff?)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, stale-while-revalidate=86400" always;
    add_header X-Cache-Status "static-image" always;

    etag on;
    if_modified_since exact;
    access_log off;
}

# ---------------------------------------------------------------------------
# 5. MEDIA & LARGE FILES — long cache + range request support
# ---------------------------------------------------------------------------
location ~* \.(mp4|webm|ogg|mp3|wav|pdf|zip|tar|gz|rar|7z)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000" always;
    add_header X-Cache-Status "static-media" always;
    add_header Accept-Ranges "bytes" always;

    # For large files, use direct I/O to bypass page cache (avoids
    # thrashing the cache with multi-GB files).
    directio 4m;
    output_buffers 2 1m;

    access_log off;
}

# ---------------------------------------------------------------------------
# 6. MANIFEST & FEED FILES — short cache (update frequently)
# ---------------------------------------------------------------------------
location ~* \.(json|xml|rss|atom|txt|webmanifest|manifest)$ {
    expires 1h;
    add_header Cache-Control "public, max-age=3600, stale-while-revalidate=3600" always;
    add_header X-Cache-Status "static-data" always;

    etag on;
    if_modified_since exact;
}

# ---------------------------------------------------------------------------
# 7. FALLBACK — root location with index + 404 handling
# ---------------------------------------------------------------------------
# Try the exact file → directory with index → custom 404.
# For SPAs, change the last fallback to /index.html:
#   try_files $uri $uri/ /index.html;
location / {
    try_files $uri $uri/ =404;

    # Default caching for anything not matched above.
    expires 1h;
    add_header Cache-Control "public, max-age=3600, stale-while-revalidate=3600, stale-if-error=86400" always;

    etag on;
    if_modified_since exact;
}

# ---------------------------------------------------------------------------
# 8. DENY ACCESS TO HIDDEN FILES & SENSITIVE PATHS
# ---------------------------------------------------------------------------
# Belt + suspenders with the ddos-global.conf path scanner.
location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
}

# ---------------------------------------------------------------------------
# 9. PERFORMANCE TUNING
# ---------------------------------------------------------------------------
# Disable access log for static assets if you want max performance.
# Uncomment the line below to disable ALL access logging in this server block.
# Warning: you'll lose visibility into traffic. Only do this under heavy attack.
# access_log off;

# Disable not-found logging for missing favicons and robots.txt.
location = /favicon.ico {
    access_log off;
    log_not_found off;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000" always;
}

location = /robots.txt {
    access_log off;
    log_not_found off;
    expires 1d;
    add_header Cache-Control "public, max-age=86400" always;
}
