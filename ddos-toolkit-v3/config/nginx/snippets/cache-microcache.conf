# =============================================================================
# Micro-Cache — 1-Second Cache for Dynamic Sites v3.0
# =============================================================================
# The nuclear option for dynamic sites under DDoS.
#
# HOW IT WORKS:
#   Cache EVERY response for just 1 second. That's it.
#   Under normal traffic: virtually invisible. Content is at most 1s stale.
#   Under DDoS (10,000 req/s): your backend handles 1 req/s.
#   The other 9,999 requests get the 1-second-old cached copy.
#
# USE:
#   location / {
#       proxy_pass http://backend;
#       include snippets/cache-microcache.conf;
#   }
#
# WARNING: This caches POST responses too (disabled by default).
#          Don't use on endpoints that mutate state (checkout, login)
#          unless you exclude them.
# =============================================================================

# --- Enable cache with 1-second TTL ---
proxy_cache ddos_proxy_cache;
proxy_cache_key "$scheme$request_method$host$request_uri";
proxy_cache_valid 200 1s;
proxy_cache_valid 301 302 5s;
proxy_cache_valid 404 1s;

# --- Stale serving (same as cache-proxy.conf) ---
proxy_cache_use_stale error timeout updating http_500 http_502 http_503;
proxy_cache_lock on;
proxy_cache_lock_timeout 2s;
proxy_cache_background_update on;

# --- Skip cache for authenticated users ---
# Adjust cookie names for your app.
set $skip_cache 0;
if ($http_cookie ~* "session_id|PHPSESSID|wordpress_logged|token") {
    set $skip_cache 1;
}

# Skip cache for POST by default (uncomment to cache POST too).
# if ($request_method = POST) {
#     set $skip_cache 1;
# }

proxy_cache_bypass $skip_cache;
proxy_no_cache $skip_cache;

# --- Debug header ---
add_header X-Micro-Cache $upstream_cache_status always;
