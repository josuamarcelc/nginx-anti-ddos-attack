# =============================================================================
# DDoS Prevention — Auth/Login Endpoint Rate Limiting v3.0
# =============================================================================
# Include inside location blocks for login/admin endpoints:
#   location /login { include snippets/ddos-auth.conf; ... }
#   location /wp-login.php { include snippets/ddos-auth.conf; ... }
# =============================================================================

# Tight rate: 3 req/sec, burst 3 — brute force eats dirt here.
limit_req zone=ddos_auth_limit burst=3 nodelay;
limit_req_status 429;

# Smaller body for auth endpoints (no reason for large payloads on login).
client_max_body_size 64k;
client_body_timeout 5s;
