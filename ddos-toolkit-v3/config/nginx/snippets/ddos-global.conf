# =============================================================================
# DDoS Prevention — Server Block Snippet v3.0
# =============================================================================
# Include this inside every server { } block:
#   include snippets/ddos-global.conf;
# =============================================================================

# --- IP blocklist (checked first — cheapest check) ---
if ($ddos_blocked_ip) {
    access_log /var/log/nginx/ddos-blocked.log ddos_blocked;
    return 444;
}

# --- HTTP smuggling attempt ---
if ($ddos_smuggle_attempt) {
    access_log /var/log/nginx/ddos-blocked.log ddos_blocked;
    return 444;
}

# --- Random query flood ---
if ($ddos_random_root_query) {
    access_log /var/log/nginx/ddos-blocked.log ddos_blocked;
    return 444;
}

# --- Path scanner / vuln probe ---
if ($ddos_path_scan) {
    access_log /var/log/nginx/ddos-blocked.log ddos_blocked;
    return 444;
}

# --- Bad user-agent ---
if ($ddos_bad_ua) {
    access_log /var/log/nginx/ddos-blocked.log ddos_blocked;
    return 444;
}

# --- Disallowed HTTP methods ---
if ($ddos_bad_method) {
    access_log /var/log/nginx/ddos-blocked.log ddos_blocked;
    return 444;
}

# --- Referer spam ---
if ($ddos_bad_referer) {
    access_log /var/log/nginx/ddos-blocked.log ddos_blocked;
    return 444;
}

# --- Rate limiting ---
limit_req zone=ddos_req_limit burst=30 nodelay;
limit_req_status 429;

# --- Connection limiting: max 50 concurrent per IP, 10000 per server ---
limit_conn ddos_conn_limit 50;
limit_conn ddos_server_conn 10000;
limit_conn_status 429;

# --- Request body size cap (adjust per app) ---
client_max_body_size 10m;

# --- Timeout hardening (slowloris / slow-read / slow-post) ---
client_body_timeout 10s;
client_header_timeout 10s;
send_timeout 10s;
keepalive_timeout 15s 15s;
keepalive_requests 100;

# --- Hide server tokens ---
server_tokens off;

# --- Security headers (full set) ---
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

# --- HSTS (uncomment if you're 100% HTTPS — do NOT enable on mixed setups) ---
# add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

# --- Content-Security-Policy (tune per application — this is a sane default) ---
# add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'self';" always;
