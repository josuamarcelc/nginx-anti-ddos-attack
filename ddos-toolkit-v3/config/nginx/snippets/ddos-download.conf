# =============================================================================
# DDoS Prevention — Download / Static Asset Rate Limiting v3.0
# =============================================================================
# Include inside location blocks serving large static files:
#   location /downloads { include snippets/ddos-download.conf; ... }
#   location ~* \.(zip|tar|gz|iso|exe|dmg)$ { include snippets/ddos-download.conf; ... }
# =============================================================================

limit_req zone=ddos_download_limit burst=5 nodelay;
limit_req_status 429;

# Bandwidth per-connection: 1MB/s after first 5MB (prevents pipe saturation).
limit_rate_after 5m;
limit_rate 1m;
