# =============================================================================
# Proxy Cache Hardening — Server Block Snippet v3.0
# =============================================================================
# Include inside server { } blocks that proxy to a backend (Node, PHP, etc.):
#   include snippets/cache-proxy.conf;
#
# Use AFTER ddos-global.conf:
#   server {
#       include snippets/ddos-global.conf;
#       include snippets/cache-proxy.conf;
#
#       location / {
#           proxy_pass http://127.0.0.1:3000;
#           include snippets/cache-proxy-location.conf;
#       }
#   }
#
# GOAL: If your backend goes down during a DDoS, nginx keeps serving
#        cached responses. Users don't see 502/503. Your site stays alive.
# =============================================================================

# ---------------------------------------------------------------------------
# 1. ENABLE PROXY CACHE (uses zone defined in cache-global.conf)
# ---------------------------------------------------------------------------
proxy_cache ddos_proxy_cache;

# Cache key: scheme + host + URI. This covers 99% of static-ish sites.
# For sites with query string variations, add $args:
#   proxy_cache_key "$scheme$host$request_uri$args";
proxy_cache_key "$scheme$host$request_uri";

# ---------------------------------------------------------------------------
# 2. CACHE DURATION BY STATUS CODE
# ---------------------------------------------------------------------------
# 200 OK: cache for 1 hour.
proxy_cache_valid 200 1h;

# 301/302 redirects: cache for 10 minutes.
proxy_cache_valid 301 302 10m;

# 404: cache for 1 minute (prevents hammering backend for missing pages).
proxy_cache_valid 404 1m;

# Everything else: don't cache.
proxy_cache_valid any 0;

# ---------------------------------------------------------------------------
# 3. STALE CONTENT SERVING (THE KEY TO DDoS SURVIVAL)
# ---------------------------------------------------------------------------
# This is the most important directive in this entire file.
#
# When the backend is down (error, timeout, 500, 502, 503, 429),
# nginx serves the STALE cached copy instead of showing an error page.
# Users see a slightly outdated page instead of a 502 Bad Gateway.
#
# "updating" means: while one request is refreshing the cache,
# all other requests get the stale copy. Only ONE request hits backend.
proxy_cache_use_stale error timeout invalid_header updating
                      http_500 http_502 http_503 http_429;

# Only allow one request at a time to refresh a cache entry.
# All other concurrent requests for the same URI get the stale copy.
# Under DDoS, this means 1000 requests/sec for the same page only
# generate 1 backend request. The other 999 get cached responses.
proxy_cache_lock on;
proxy_cache_lock_timeout 5s;
proxy_cache_lock_age 5s;

# Serve stale while background-refreshing (non-blocking revalidation).
proxy_cache_background_update on;

# Re-validate with backend using conditional requests (If-Modified-Since).
# Backend can return 304 Not Modified = tiny response, cache stays warm.
proxy_cache_revalidate on;

# ---------------------------------------------------------------------------
# 4. CACHE BYPASS CONTROLS
# ---------------------------------------------------------------------------
# Don't cache requests with these cookies (logged-in users, sessions).
# Adjust the cookie names to match your application.
map $http_cookie $cache_bypass {
    default 0;
    "~*session_id"      1;
    "~*PHPSESSID"       1;
    "~*wordpress_logged" 1;
    "~*token"           1;
}

# Allow cache bypass via header (for deployments / cache purge).
# Send "X-Cache-Bypass: 1" header to force a fresh fetch.
map $http_x_cache_bypass $force_bypass {
    default 0;
    "1"     1;
}

# ---------------------------------------------------------------------------
# 5. CACHE STATUS HEADER (debugging / monitoring)
# ---------------------------------------------------------------------------
# Adds X-Cache-Status header to responses:
#   HIT     = served from cache
#   MISS    = fetched from backend, now cached
#   BYPASS  = cache skipped (cookie/header bypass)
#   STALE   = served stale copy (backend down or updating)
#   EXPIRED = cache expired, re-fetching
add_header X-Cache-Status $upstream_cache_status always;

# ---------------------------------------------------------------------------
# 6. BUFFER SETTINGS (prevent backend slowness from blocking workers)
# ---------------------------------------------------------------------------
proxy_buffering on;
proxy_buffer_size 4k;
proxy_buffers 8 16k;
proxy_busy_buffers_size 32k;

# Timeout for connecting to backend (short = fail fast, serve stale).
proxy_connect_timeout 5s;
proxy_read_timeout 10s;
proxy_send_timeout 5s;

# Pass real IP to backend.
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
