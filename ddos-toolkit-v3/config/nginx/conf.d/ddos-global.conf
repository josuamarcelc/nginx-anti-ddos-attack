# ---------------------------------------------------------------------------
# 11. BLOCKED REQUEST LOGGING (separate log for attack audit)
# ---------------------------------------------------------------------------
log_format ddos_blocked escape=json
    '{"time":"$time_iso8601",'
    '"ip":"$remote_addr",'
    '"method":"$request_method",'
    '"uri":"$request_uri",'
    '"status":$status,'
    '"ua":"$http_user_agent",'
    '"referer":"$http_referer",'
    '"bytes":$bytes_sent}';
