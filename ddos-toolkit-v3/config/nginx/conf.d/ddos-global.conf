# =============================================================================
# DDoS Prevention — Global Nginx Configuration (http context) v3.0
# =============================================================================
# Drop this in /etc/nginx/conf.d/ — it runs inside the http {} block.
# Pair with snippets/ddos-global.conf inside each server {} block.
# =============================================================================

# ---------------------------------------------------------------------------
# 1. RATE LIMITING ZONES
# ---------------------------------------------------------------------------
limit_req_zone $binary_remote_addr zone=ddos_req_limit:20m rate=15r/s;
limit_req_zone $binary_remote_addr zone=ddos_auth_limit:10m rate=3r/s;
limit_req_zone $binary_remote_addr zone=ddos_post_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=ddos_download_limit:10m rate=2r/s;

# ---------------------------------------------------------------------------
# 2. CONNECTION LIMITS
# ---------------------------------------------------------------------------
limit_conn_zone $binary_remote_addr zone=ddos_conn_limit:20m;
limit_conn_zone $server_name zone=ddos_server_conn:10m;

# ---------------------------------------------------------------------------
# 3. BUFFER & HEADER SIZE LIMITS (anti large-header / buffer overflow)
# ---------------------------------------------------------------------------
client_header_buffer_size 1k;
large_client_header_buffers 4 8k;
client_body_buffer_size 16k;

# ---------------------------------------------------------------------------
# 4. HTTP/2 ABUSE PROTECTION (rapid-reset / stream flood)
# ---------------------------------------------------------------------------
http2_max_concurrent_streams 64;

# ---------------------------------------------------------------------------
# 5. FLOOD PATTERN DETECTION — maps
# ---------------------------------------------------------------------------
map $request_uri $ddos_random_root_query {
    default 0;
    "~^/\?(?:[A-Za-z0-9_]{0,20}=)?[A-Za-z0-9]{4,128}$"                    1;
    "~^/\?[A-Za-z0-9_]{1,20}=[A-Za-z0-9]{4,128}&[A-Za-z0-9_=&]{1,256}$"   1;
    "~^/\?(?:[a-f0-9]{8,})$"                                                1;
}

# Path-based scan flood: probing known vulnerable paths
map $request_uri $ddos_path_scan {
    default 0;
    # WordPress
    "~^/(?:wp-login|xmlrpc|wp-admin/admin-ajax)\.php"  1;
    "~^/wp-content/debug\.log"                          1;
    "~^/wp-json/wp/v2/users"                            1;
    # Environment / config / secrets
    "~^/\.env"                                          1;
    "~^/\.git"                                          1;
    "~^/\.svn"                                          1;
    "~^/\.hg"                                           1;
    "~^/\.DS_Store"                                     1;
    "~^/\.htaccess"                                     1;
    "~^/\.htpasswd"                                     1;
    "~^/\.aws/"                                         1;
    "~^/\.docker/"                                      1;
    "~^/\.ssh/"                                         1;
    "~^/\.kube/"                                        1;
    "~^/\.npmrc"                                        1;
    "~^/config\."                                       1;
    "~^/configuration\."                                1;
    "~^/docker-compose"                                 1;
    "~^/Dockerfile"                                     1;
    "~^/credentials"                                    1;
    "~^/passwd$"                                        1;
    "~^/shadow$"                                        1;
    "~^/id_rsa"                                         1;
    # PHP / server info
    "~^/phpinfo"                                        1;
    "~^/php-?my-?admin"                                 1;
    "~^/pma/"                                           1;
    "~^/server-status"                                  1;
    "~^/server-info"                                    1;
    # Java / Spring Boot
    "~^/actuator"                                       1;
    "~^/jolokia"                                        1;
    "~^/heapdump"                                       1;
    "~^/env$"                                           1;
    "~^/trace$"                                         1;
    "~^/beans$"                                         1;
    "~^/mappings$"                                      1;
    # General probes
    "~^/debug"                                          1;
    "~^/cgi-bin"                                        1;
    "~^/vendor/"                                        1;
    "~^/telescope/"                                     1;
    "~^/console"                                        1;
    "~^/solr/"                                          1;
    "~^/manager/"                                       1;
    "~^/admin(?:istrator)?/"                            1;
    "~^/backup"                                         1;
    "~^/db\."                                           1;
    "~^/sql"                                            1;
    "~^/shell"                                          1;
    "~^/eval"                                           1;
    "~^/setup"                                          1;
    "~^/install"                                        1;
    # Node / JS
    "~^/node_modules/"                                  1;
    "~^/package\.json"                                  1;
    "~^/yarn\.lock"                                     1;
    "~^/__graphql$"                                     1;
    # Kubernetes
    "~^/api/v1/pods"                                    1;
    # .NET
    "~^/elmah\.axd"                                     1;
    # Backup / temp file extensions
    "~*\.(bak|old|orig|save|swp|temp|tmp|copy|dist)$"   1;
}

# ---------------------------------------------------------------------------
# 6. BAD USER-AGENT BLOCKING
# ---------------------------------------------------------------------------
map $http_user_agent $ddos_bad_ua {
    default 0;
    ""                                        1;
    # Scripting libraries
    "~*python-requests"                       1;
    "~*python-urllib"                          1;
    "~*python-httpx"                           1;
    "~*aiohttp"                               1;
    "~*Go-http-client"                        1;
    "~*java/"                                 1;
    "~*HttpClient"                            1;
    "~*okhttp"                                1;
    "~*libwww-perl"                           1;
    "~*lwp-"                                  1;
    "~*Wget"                                  1;
    "~*curl/"                                 1;
    "~*node-fetch"                            1;
    "~*axios/"                                1;
    "~*undici"                                1;
    "~*got/"                                  1;
    "~*ky/"                                   1;
    # Scanners & exploit tools
    "~*PHPCrawl"                              1;
    "~*masscan"                               1;
    "~*Nmap"                                  1;
    "~*Nikto"                                 1;
    "~*sqlmap"                                1;
    "~*ZmEu"                                  1;
    "~*dirbuster"                             1;
    "~*gobuster"                              1;
    "~*feroxbuster"                           1;
    "~*ffuf"                                  1;
    "~*nuclei"                                1;
    "~*httpx"                                 1;
    "~*zgrab"                                 1;
    "~*Scrapy"                                1;
    "~*Commix"                                1;
    "~*WPScan"                                1;
    "~*Jorgee"                                1;
    "~*Havij"                                 1;
    "~*w3af"                                  1;
    "~*Acunetix"                              1;
    "~*Nessus"                                1;
    "~*OpenVAS"                               1;
    "~*BurpSuite"                             1;
    "~*CensysInspect"                         1;
    "~*NetcraftSurvey"                        1;
    "~*phantomjs"                             1;
    "~*HeadlessChrome.*bot"                   1;
    # SEO spam / AI crawlers
    "~*MJ12bot"                               1;
    "~*AhrefsBot"                             1;
    "~*SemrushBot"                            1;
    "~*DotBot"                                1;
    "~*BLEXBot"                               1;
    "~*PetalBot"                              1;
    "~*MegaIndex"                             1;
    "~*Bytespider"                            1;
    "~*GPTBot"                                1;
    "~*ClaudeBot"                             1;
    "~*CCBot"                                 1;
    "~*DataForSeoBot"                         1;
    "~*Sogou"                                 1;
    "~*YisouSpider"                           1;
    "~*AspiegelBot"                           1;
    "~*Amazonbot"                             1;
    "~*anthropic-ai"                          1;
    "~*cohere-ai"                             1;
    "~*PerplexityBot"                         1;
    "~*YouBot"                                1;
}

# ---------------------------------------------------------------------------
# 7. REQUEST METHOD FILTERING
# ---------------------------------------------------------------------------
# NOTE: OPTIONS is allowed for CORS/API compat. Uncomment to block.
map $request_method $ddos_bad_method {
    default  0;
    TRACE    1;
    TRACK    1;
    CONNECT  1;
    # OPTIONS  1;
}

# ---------------------------------------------------------------------------
# 8. REFERER SPAM BLOCKING
# ---------------------------------------------------------------------------
map $http_referer $ddos_bad_referer {
    default 0;
    "~*semalt\.com"               1;
    "~*buttons-for-website\.com"  1;
    "~*darodar\.com"              1;
    "~*best-seo-offer\.com"       1;
    "~*free-share-buttons\.com"   1;
    "~*social-buttons\.com"       1;
    "~*get-free-traffic-now\.com" 1;
    "~*buy-cheap-online\.info"    1;
    "~*event-tracking\.com"       1;
    "~*ilovevitaly\.com"          1;
    "~*priceg\.com"               1;
    "~*hulfingtonpost\.com"       1;
    "~*screentoolkit\.com"        1;
}

# ---------------------------------------------------------------------------
# 9. HTTP SMUGGLING DETECTION (malformed Transfer-Encoding)
# ---------------------------------------------------------------------------
map $http_transfer_encoding $ddos_smuggle_attempt {
    default 0;
    "~*,.*chunked"    1;
    "~*chunked.*,"    1;
}

# ---------------------------------------------------------------------------
# 10. IP BLOCKLIST — geo block
# ---------------------------------------------------------------------------
geo $ddos_blocked_ip {
    default 0;
    include /etc/nginx/ddos-blocklist-generated.conf;

    # --- Known bad subnets (manual curated) ---
