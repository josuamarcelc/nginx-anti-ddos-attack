# =============================================================================
# Static Site Cache Hardening — Global Configuration (http context) v3.0
# =============================================================================
# Drop this in /etc/nginx/conf.d/ — runs inside the http {} block.
# Goal: serve everything from RAM so DDoS hits cost ZERO disk I/O.
# =============================================================================

# ---------------------------------------------------------------------------
# 1. KERNEL-LEVEL FILE SERVING (zero-copy)
# ---------------------------------------------------------------------------
# Most distros ship nginx.conf with `sendfile on;` and `tcp_nopush on;`
# already in the http {} block. Redeclaring here would be a fatal "duplicate
# directive" error. We leave them commented and document them, so this file
# is safe to install on any nginx out of the box.
#
# Verify yours is on:
#   grep -nE '^\s*(sendfile|tcp_nopush|tcp_nodelay)' /etc/nginx/nginx.conf
# If any are missing, uncomment the matching line below:
#
# sendfile on;
# tcp_nopush on;
tcp_nodelay on;

# ---------------------------------------------------------------------------
# 2. OPEN FILE CACHE (file descriptor + metadata caching in memory)
# ---------------------------------------------------------------------------
# WITHOUT this: every request = stat() + open() + fstat() syscalls.
# WITH this: file descriptors stay hot in memory. Under DDoS, this means
# thousands of requests/sec served with ZERO disk syscalls.
#
# max=50000  — cache up to 50k file descriptors (tune to your file count)
# inactive=120s — evict after 2 min of no access
open_file_cache max=50000 inactive=120s;

# Re-validate cached entries every 60s (checks if file changed on disk).
open_file_cache_valid 60s;

# Keep in cache even if accessed only once (important under DDoS —
# even a single request should warm the cache).
open_file_cache_min_uses 1;

# Cache file lookup errors too (404s). Under DDoS with random paths,
# this prevents repeated stat() calls for non-existent files.
open_file_cache_errors on;

# ---------------------------------------------------------------------------
# 3. GZIP COMPRESSION (runtime — fallback when pre-compressed not available)
# ---------------------------------------------------------------------------
# Stock nginx.conf usually has `gzip on;`. Uncomment if yours doesn't.
# gzip on;
gzip_vary on;

# Compress for proxied requests too (important behind Cloudflare/LB).
gzip_proxied any;

# Level 4 is the sweet spot: 90% of level 9's compression at 25% CPU cost.
gzip_comp_level 4;

# Don't compress tiny responses — overhead isn't worth it.
gzip_min_length 256;

# Buffer config for compression.
gzip_buffers 16 8k;

# Compress these MIME types (text/html is always compressed).
gzip_types
    text/plain
    text/css
    text/javascript
    text/xml
    text/csv
    text/markdown
    application/javascript
    application/x-javascript
    application/json
    application/xml
    application/xml+rss
    application/atom+xml
    application/ld+json
    application/manifest+json
    application/vnd.ms-fontobject
    application/x-font-ttf
    application/x-font-opentype
    application/x-web-app-manifest+json
    font/opentype
    font/eot
    font/otf
    image/svg+xml
    image/x-icon;

# ---------------------------------------------------------------------------
# 4. GZIP STATIC (serve pre-compressed .gz files — ZERO runtime CPU)
# ---------------------------------------------------------------------------
# If you run the cache-warmup.sh script, it pre-compresses all static assets.
# nginx will serve the .gz file directly instead of compressing on-the-fly.
# This is THE key to surviving DDoS: zero CPU per response.
gzip_static on;

# ---------------------------------------------------------------------------
# 5. BROTLI (if ngx_brotli module is installed — better compression than gzip)
# ---------------------------------------------------------------------------
# Uncomment these if you have the brotli module compiled:
# brotli on;
# brotli_comp_level 4;
# brotli_types text/plain text/css text/javascript application/javascript
#              application/json application/xml image/svg+xml;
# brotli_static on;

# ---------------------------------------------------------------------------
# 6. PROXY CACHE ZONE (for reverse proxy setups with backend)
# ---------------------------------------------------------------------------
# Skip this if you're serving purely static files with no backend.
# 256MB RAM cache + 1GB disk cache. keys_zone holds metadata in RAM.
# inactive=24h means cached items expire after 24h of no access.
proxy_cache_path /var/cache/nginx/proxy
    levels=1:2
    keys_zone=ddos_proxy_cache:64m
    max_size=1g
    inactive=24h
    use_temp_path=off;

# Fast cache key lookup. Uses page-aligned temp files for efficiency.
proxy_temp_path /var/cache/nginx/proxy_temp;

# ---------------------------------------------------------------------------
# 7. MIME TYPES HASH (performance tuning)
# ---------------------------------------------------------------------------
# Stock nginx.conf usually sets this — uncomment if yours doesn't.
# types_hash_max_size 2048;
types_hash_bucket_size 64;
