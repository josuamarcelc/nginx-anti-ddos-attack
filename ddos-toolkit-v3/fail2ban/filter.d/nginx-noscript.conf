# =============================================================================
# Fail2ban filter — WordPress / PHP / shell probe attempts on non-target hosts
# =============================================================================
# Catches automated bots probing for common admin / config / shell paths.
# Pair with [nginx-noscript] in jail.local.
# =============================================================================

[Definition]

failregex = ^<HOST> \S+ \S+ \[[^\]]+\] "(GET|POST|HEAD) [^"]*(?:/wp-login\.php|/xmlrpc\.php|/wp-admin\.php|/administrator/|/phpmyadmin/|/pma/|/myadmin/|/manager/html|/\.env|/\.git/config|/\.aws/credentials|/wp-config\.php|/etc/passwd|/admin/config\.php|/cgi-bin/|/shell\.php|/c99\.php|/r57\.php)[^"]*" \d+ \d+

ignoreregex =

datepattern = {^LN-BEG}%%d/%%b/%%Y:%%H:%%M:%%S %%z
              ^[^\[]*\[
