# =============================================================================
# Fail2ban filter — match scanner UAs (one hit = ban)
# =============================================================================
# Drops vulnerability scanners and offensive-security tools at the firewall
# level instead of nginx-444. Pair with [nginx-badbots] in jail.local.
# =============================================================================

[Definition]

failregex = ^<HOST> \S+ \S+ \[[^\]]+\] "[^"]*" \d+ \d+ "[^"]*" "[^"]*(?:nikto|sqlmap|fimap|masscan|nmap|wpscan|dirbuster|gobuster|whatweb|acunetix|nessus|openvas|metasploit|burpsuite|zaproxy|nuclei|httpx|katana|skipfish|arachni)[^"]*"

ignoreregex =

datepattern = {^LN-BEG}%%d/%%b/%%Y:%%H:%%M:%%S %%z
              ^[^\[]*\[
