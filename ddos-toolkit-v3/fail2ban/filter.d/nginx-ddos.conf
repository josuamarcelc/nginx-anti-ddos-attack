# =============================================================================
# Fail2ban filter — matches abuse signatures emitted by ddos-advanced.conf
# =============================================================================
# Path: /etc/fail2ban/filter.d/nginx-ddos.conf
# Matches the standard "combined" nginx access log format. Adjust the regex
# tail if you've customized log_format.
# =============================================================================

[Definition]

# What counts as a "failure":
#   • Any 403 (our query-string / referer filters)
#   • Any 444 (our scanner-UA / empty-UA drops)
# We don't ban on 401 because legitimate auth retries happen.
failregex = ^<HOST> \S+ \S+ \[[^\]]+\] "(GET|POST|HEAD|PUT|DELETE|PATCH|OPTIONS) [^"]*" (403|444) \d+ "[^"]*" "[^"]*"

# What's a non-failure (skip):
ignoreregex =

# datepattern: fail2ban needs to know how to read the timestamp.
# Default works for combined/main format; override only if log_format diverges.
datepattern = {^LN-BEG}%%d/%%b/%%Y:%%H:%%M:%%S %%z
              ^[^\[]*\[
