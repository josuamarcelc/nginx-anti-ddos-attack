# Current flood pattern: randomized root queries like /?abc=RandomValue or /?=RandomValue.
# Drop at Nginx before the request can reach PHP-FPM.
map $request_uri $ddos_random_root_query {
	default 0;
	"~^/\?(?:[A-Za-z0-9]{1,16}=|=)?[A-Za-z0-9]{6,64}$" 1;
	"~^/\?[A-Za-z0-9]{1,16}=[A-Za-z0-9]{6,64}$" 1;
}

geo $ddos_blocked_ip {
	default 0;
	include /etc/nginx/ddos-blocklist-generated.conf;
	5.181.171.0/24 1;
	5.183.254.0/24 1;
	45.66.211.0/24 1;
	45.132.187.0/24 1;
	45.159.20.0/24 1;
	88.218.44.0/24 1;
	89.19.35.0/24 1;
	103.175.79.0/24 1;
	122.8.45.0/24 1;
